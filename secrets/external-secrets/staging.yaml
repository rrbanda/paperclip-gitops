apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: paperclip-secrets
  namespace: paperclip-staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-cluster-backend
    kind: ClusterSecretStore
  target:
    name: paperclip-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: paperclip/secrets/db-password
        property: value
    - secretKey: DATABASE_URL
      remoteRef:
        key: paperclip/secrets/database-url
        property: value
    - secretKey: BETTER_AUTH_SECRET
      remoteRef:
        key: paperclip/secrets/auth-secret
        property: value
    - secretKey: USER_RBANDA_PASSWORD
      remoteRef:
        key: paperclip/users/rbanda
        property: password
    - secretKey: USER_MLIVINGS_PASSWORD
      remoteRef:
        key: paperclip/users/mlivings
        property: password
