apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paperclip-test
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/rrbanda/paperclip-gitops.git
    targetRevision: main
    path: overlays/test
  destination:
    server: https://kubernetes.default.svc
    namespace: paperclip-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /spec/host
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/containers/0/image
