apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: paperclip-platform
  namespace: openshift-gitops
spec:
  generators:
    - git:
        repoURL: https://github.com/rrbanda/paperclip-gitops.git
        revision: main
        directories:
          - path: platform/environments/*
  template:
    metadata:
      name: "paperclip-{{path.basename}}"
      namespace: openshift-gitops
    spec:
      project: default
      source:
        repoURL: https://github.com/rrbanda/paperclip-gitops.git
        targetRevision: main
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "paperclip-{{path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      ignoreDifferences:
        - group: route.openshift.io
          kind: Route
          jsonPointers:
            - /spec/host
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/template/spec/containers/0/image
