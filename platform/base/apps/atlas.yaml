apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas
  labels:
    app: atlas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atlas
  template:
    metadata:
      labels:
        app: atlas
    spec:
      containers:
        - name: atlas
          image: image-registry.openshift-image-registry.svc:5000/paperclip/atlas:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: atlas-secrets
            - configMapRef:
                name: atlas-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: atlas
  labels:
    app: atlas
spec:
  selector:
    app: atlas
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: atlas
  labels:
    app: atlas
spec:
  to:
    kind: Service
    name: atlas
  port:
    targetPort: 3000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-config
  labels:
    app: atlas
data:
  NEXT_PUBLIC_APP_NAME: "ATLAS"
  PAPERCLIP_API_URL: "http://paperclip:3100"
  PAPERCLIP_COMPANY_ID: "52d75bd0-d5db-4aa3-ae5b-a991111c4e00"
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: atlas
  labels:
    app: atlas
spec:
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: atlas:latest
  resources:
    requests:
      memory: "2Gi"
    limits:
      memory: "4Gi"
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: atlas
  labels:
    app: atlas
