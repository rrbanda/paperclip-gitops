apiVersion: v1
kind: ResourceQuota
metadata:
  name: paperclip-quota
spec:
  hard:
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "32"
    limits.memory: "64Gi"
    persistentvolumeclaims: "10"
    pods: "20"
    services: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: paperclip-limits
spec:
  limits:
    - type: Container
      default:
        memory: "1Gi"
        cpu: "1"
      defaultRequest:
        memory: "128Mi"
        cpu: "100m"
      max:
        memory: "32Gi"
        cpu: "8"
      min:
        memory: "32Mi"
        cpu: "10m"
    - type: Pod
      max:
        memory: "32Gi"
        cpu: "8"
