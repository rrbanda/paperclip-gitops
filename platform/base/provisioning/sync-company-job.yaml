apiVersion: batch/v1
kind: Job
metadata:
  name: sync-company-config
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: sync
          image: curlimages/curl:8.7.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              PAPERCLIP_URL="http://paperclip:3100"

              echo "=== Company Config Sync ==="
              echo "Waiting for Paperclip to be ready..."
              for i in $(seq 1 30); do
                if curl -sf "$PAPERCLIP_URL/api/health" > /dev/null 2>&1; then
                  echo "Paperclip is ready."
                  break
                fi
                if [ "$i" -eq 30 ]; then
                  echo "ERROR: Paperclip not ready after 60s"
                  exit 1
                fi
                sleep 2
              done

              # Get company ID
              COMPANY_RESPONSE=$(curl -sf "$PAPERCLIP_URL/api/companies" || echo "[]")
              COMPANY_ID=$(echo "$COMPANY_RESPONSE" | sed -n 's/.*"id":"\([^"]*\)".*/\1/p' | head -1)

              if [ -z "$COMPANY_ID" ]; then
                echo "No company found. Skipping company config sync."
                echo "(Bootstrap the instance first, then re-sync)"
                exit 0
              fi

              echo "Company ID: $COMPANY_ID"
              echo ""

              # Sync skills to the skill store
              echo "--- Syncing skills ---"
              SKILLS_DIR="/company/skills"
              if [ -d "$SKILLS_DIR" ]; then
                for skill_dir in "$SKILLS_DIR"/*/; do
                  if [ -f "$skill_dir/SKILL.md" ]; then
                    skill_name=$(basename "$skill_dir")
                    echo "  Importing skill: $skill_name"
                    # Read SKILL.md content
                    SKILL_CONTENT=$(cat "$skill_dir/SKILL.md")
                    # Use the import API
                    RESULT=$(curl -sf -X POST "$PAPERCLIP_URL/api/companies/$COMPANY_ID/skills/import" \
                      -H "Content-Type: application/json" \
                      -d "{\"source\":\"inline\",\"markdown\":$(echo "$SKILL_CONTENT" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))' 2>/dev/null || echo '""')}" 2>&1 || echo "FAILED")
                    if echo "$RESULT" | grep -q "FAILED\|error"; then
                      echo "    WARNING: Could not import $skill_name (may need CLI)"
                    else
                      echo "    OK"
                    fi
                  fi
                done
              else
                echo "  No skills directory found"
              fi

              echo ""
              echo "--- Syncing agents (declarative check) ---"
              # List current agents
              AGENT_COUNT=$(curl -sf "$PAPERCLIP_URL/api/companies/$COMPANY_ID/agents" | grep -o '"id"' | wc -l)
              echo "  Current agents in system: $AGENT_COUNT"
              echo "  (Full agent sync requires paperclipai CLI or company import API)"

              echo ""
              echo "=== Company config sync complete ==="
          volumeMounts:
            - name: company-config
              mountPath: /company
              readOnly: true
      volumes:
        - name: company-config
          configMap:
            name: paperclip-company-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: paperclip-company-config
data:
  company.yaml: |
    companyId: "52d75bd0-d5db-4aa3-ae5b-a991111c4e00"
    name: "Red Hat Americas AI Platform Team"
