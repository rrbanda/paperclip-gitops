apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Core infrastructure
  - core/namespace.yaml
  - core/postgres-service.yaml
  - core/postgres-statefulset.yaml
  - core/paperclip-pvc.yaml
  - core/paperclip-deployment.yaml
  - core/paperclip-service.yaml
  - core/paperclip-route.yaml
  - core/paperclip-buildconfig.yaml

  # Satellite applications
  - apps/atlas.yaml
  - apps/eval-portal.yaml

  # Security
  - security/network-policies.yaml
  - security/resource-quota.yaml
  - security/rbac.yaml

  # Operations
  - operations/postgres-backup.yaml
  - operations/monitoring.yaml
  - operations/tekton-pipelines.yaml

  # Provisioning (users, company sync)
  - provisioning/external-secret.yaml
  - provisioning/provision-users-job.yaml
  - provisioning/sync-company-job.yaml
  - provisioning/users-configmap.yaml
