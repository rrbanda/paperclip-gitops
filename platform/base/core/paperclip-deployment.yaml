apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperclip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperclip
  template:
    metadata:
      labels:
        app: paperclip
    spec:
      containers:
        - name: paperclip
          image: image-registry.openshift-image-registry.svc:5000/paperclip/paperclip:latest
          ports:
            - containerPort: 3100
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3100"
            - name: SERVE_UI
              value: "true"
            - name: NODE_ENV
              value: "production"
            - name: PAPERCLIP_HOME
              value: "/paperclip"
            - name: PAPERCLIP_INSTANCE_ID
              value: "default"
            - name: PAPERCLIP_DEPLOYMENT_MODE
              value: "authenticated"
            - name: PAPERCLIP_DEPLOYMENT_EXPOSURE
              value: "public"
            - name: PAPERCLIP_AUTH_BASE_URL_MODE
              value: "explicit"
            - name: PAPERCLIP_PUBLIC_URL
              value: "PLACEHOLDER"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: paperclip-secrets
                  key: DATABASE_URL
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: paperclip-secrets
                  key: BETTER_AUTH_SECRET
          volumeMounts:
            - name: paperclip-data
              mountPath: /paperclip
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3100
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "4Gi"
              cpu: "4"
      volumes:
        - name: paperclip-data
          persistentVolumeClaim:
            claimName: paperclip-data
