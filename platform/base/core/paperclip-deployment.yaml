apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperclip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperclip
  template:
    metadata:
      labels:
        app: paperclip
    spec:
      initContainers:
        - name: install-adapters
          image: image-registry.openshift-image-registry.svc:5000/paperclip/paperclip:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              # Copy adapter-plugins.json to PAPERCLIP_HOME
              cp /config/adapter-plugins.json /paperclip/adapter-plugins.json

              # Ensure adapter directory exists with deps
              ADAPTER_DIR=/paperclip/adapters/openshell-direct
              if [ ! -d "$ADAPTER_DIR/node_modules/@grpc" ]; then
                echo "Installing OpenShell adapter dependencies..."
                mkdir -p "$ADAPTER_DIR"
                # Copy adapter source from gitops-managed configmap if not present
                if [ ! -f "$ADAPTER_DIR/package.json" ]; then
                  echo "Adapter source not found on PVC -- skipping (must be seeded first)"
                else
                  cd "$ADAPTER_DIR"
                  npm install --production --quiet 2>&1
                  echo "Dependencies installed."
                fi
              else
                echo "OpenShell adapter already installed."
              fi
          volumeMounts:
            - name: paperclip-data
              mountPath: /paperclip
            - name: adapter-config
              mountPath: /config
      containers:
        - name: paperclip
          image: image-registry.openshift-image-registry.svc:5000/paperclip/paperclip:latest
          ports:
            - containerPort: 3100
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3100"
            - name: SERVE_UI
              value: "true"
            - name: NODE_ENV
              value: "production"
            - name: PAPERCLIP_HOME
              value: "/paperclip"
            - name: PAPERCLIP_INSTANCE_ID
              value: "default"
            - name: PAPERCLIP_DEPLOYMENT_MODE
              value: "authenticated"
            - name: PAPERCLIP_DEPLOYMENT_EXPOSURE
              value: "public"
            - name: PAPERCLIP_AUTH_BASE_URL_MODE
              value: "explicit"
            - name: PAPERCLIP_PUBLIC_URL
              value: "PLACEHOLDER"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: paperclip-secrets
                  key: DATABASE_URL
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: paperclip-secrets
                  key: BETTER_AUTH_SECRET
          volumeMounts:
            - name: paperclip-data
              mountPath: /paperclip
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3100
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "4Gi"
              cpu: "4"
      volumes:
        - name: paperclip-data
          persistentVolumeClaim:
            claimName: paperclip-data
        - name: adapter-config
          configMap:
            name: paperclip-adapter-plugins
