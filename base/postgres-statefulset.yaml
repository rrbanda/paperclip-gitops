apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: paperclip-db
spec:
  serviceName: paperclip-db
  replicas: 1
  selector:
    matchLabels:
      app: paperclip-db
  template:
    metadata:
      labels:
        app: paperclip-db
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "paperclip"
            - name: POSTGRES_DB
              value: "paperclip"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paperclip-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "paperclip", "-d", "paperclip"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "paperclip", "-d", "paperclip"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
